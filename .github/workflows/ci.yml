name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install paddlepaddle
        pip install -e ".[tests]"

    - name: Verify package import
      run: |
        python -c "import paddlemetrics; print(f'paddlemetrics {paddlemetrics.__version__}')"

    - name: Run core tests
      run: |
        pytest tests/unittests/bases/test_metric.py tests/unittests/bases/test_aggregation.py tests/unittests/bases/test_collections.py tests/unittests/bases/test_composition.py -v --timeout=300 -m "not DDP"

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install ruff
      run: pip install ruff

    - name: Lint core files
      run: ruff check paddlemetrics/metric.py paddlemetrics/collections.py paddlemetrics/aggregation.py paddlemetrics/__init__.py paddlemetrics/__about__.py
      continue-on-error: true
